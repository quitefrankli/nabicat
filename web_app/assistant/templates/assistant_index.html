{% extends "subpage_base.html" %}

{% block subapp_index_url %}{{ url_for('.index') }}{% endblock %}
{% block navbar_brand %}Assistant{% endblock %}
{% block scripts %}
<link rel="stylesheet" href="{{ url_for('.static', filename='assistant.css') }}">
<script defer src="{{ url_for('.static', filename='assistant.js') }}"></script>
{% endblock %}

{% block page_content %}
<div class="container-fluid mt-3 assistant-shell">
  <div class="row g-3 assistant-row">

    <!-- Sidebar: chat history -->
    <aside class="col-lg-3 col-md-4">
      <div class="card border-0 shadow-soft assistant-sidebar">
        <div class="p-3 border-bottom d-flex align-items-center gap-2">
          <button id="new-chat-btn" class="btn btn-primary btn-sm flex-grow-1 d-flex align-items-center justify-content-center gap-2" type="button">
            <i class="bi bi-plus-lg"></i>
            <span>New chat</span>
          </button>
        </div>
        <div id="chat-list" class="list-group list-group-flush assistant-chat-list">
          <div id="chat-list-empty" class="text-muted small fst-italic p-3 text-center">
            No past chats yet.
          </div>
        </div>
      </div>
    </aside>

    <!-- Main chat panel -->
    <section class="col-lg-9 col-md-8">
      <div class="card border-0 shadow-soft d-flex flex-column assistant-chat-card">

        <div class="border-bottom px-3 py-2 d-flex align-items-center gap-2">
          <i class="bi bi-chat-dots text-secondary"></i>
          <span id="chat-title" class="fw-semibold text-truncate">New chat</span>
        </div>

        <div id="chat-history" class="flex-grow-1 overflow-y-auto p-3 d-flex flex-column gap-2">
          <div class="text-muted text-center small fst-italic mt-auto pt-3" id="empty-hint">
            Send a message to start chatting with Claude.
          </div>
        </div>

        <div class="border-top p-3">
          <div id="tool-status" class="text-muted small mb-2" style="display:none;">
            <i class="bi bi-terminal me-1"></i><span id="tool-status-text"></span>
          </div>
          <div class="d-flex gap-2">
            <textarea id="chat-input" class="form-control" rows="2"
              placeholder="Ask Claude to help with code, run git commands, etc."
              style="resize:none;"></textarea>
            <button id="send-btn" class="btn btn-primary px-3" type="button">
              <i class="bi bi-send-fill"></i>
            </button>
          </div>
        </div>
      </div>
    </section>

  </div>
</div>
{% endblock %}
