{% extends "hammock_base.html" %}

{% block page_content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12 col-md-3 col-lg-2">
            {% include "hammock_sidebar.html" %}
        </div>
        <div class="col-12 col-md-9 col-lg-10">
            <div class="hammock-form-card">
                <h1 class="hammock-form-title">Edit gallery</h1>
                <p class="hammock-form-sub">{{ project_name }} / {{ post_name }}</p>

                <form id="gallery-meta-form" method="post"
                      action="{{ url_for('.edit_post', project=project_name, post=post_name) }}"
                      enctype="multipart/form-data"
                      class="hammock-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="hammock-field">
                        <label class="hammock-label">Title</label>
                        <input type="text" name="title" class="hammock-input"
                               value="{{ gallery.get('title') or meta.get('title', '') }}"
                               required maxlength="120">
                    </div>

                    <div class="hammock-field">
                        <label class="hammock-label">Description</label>
                        <textarea name="description" class="hammock-input" rows="3">{{ gallery.get('description', '') }}</textarea>
                    </div>
                </form>

                <hr class="hammock-divider">

                <h2 class="hammock-section-title">Images</h2>
                <div class="hammock-edit-grid">
                    {% for img in gallery.get('images', []) %}
                    <div class="hammock-edit-tile">
                        <img loading="lazy"
                             src="{{ url_for('.post_asset', project=project_name, post=post_name, filename='thumbs/' + img + '.webp') }}"
                             alt="{{ img }}">
                        <form method="post"
                              action="{{ url_for('.delete_gallery_image', project=project_name, post=post_name, filename=img) }}"
                              onsubmit="return confirm('Remove this image?');">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="hammock-tile-delete" aria-label="Delete image">×</button>
                        </form>
                    </div>
                    {% else %}
                    <p class="hammock-empty">No images yet — add some below.</p>
                    {% endfor %}
                </div>

                <div class="hammock-field">
                    <label class="hammock-label">Add images</label>
                    <input type="file" name="files" multiple accept="image/*" class="hammock-input"
                           form="gallery-meta-form">
                </div>

                <div class="hammock-upload-progress" data-gallery-upload-progress hidden>
                    <div class="hammock-upload-progress-label" data-gallery-upload-status>Preparing upload...</div>
                    <div class="hammock-upload-progress-track"
                         role="progressbar"
                         aria-valuemin="0"
                         aria-valuemax="100"
                         aria-valuenow="0">
                        <div class="hammock-upload-progress-bar" data-gallery-upload-bar></div>
                    </div>
                </div>

                <hr class="hammock-divider">

                <div class="hammock-actions">
                    <a href="{{ url_for('.view_post', project=project_name, post=post_name) }}"
                       class="hammock-btn hammock-btn-ghost">Cancel</a>
                    <button type="submit" form="gallery-meta-form"
                            class="hammock-btn hammock-btn-primary">Update post</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
