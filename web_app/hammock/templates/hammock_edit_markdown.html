{% extends "hammock_base.html" %}

{% block page_content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12 col-md-3 col-lg-2">
            {% include "hammock_sidebar.html" %}
        </div>
        <div class="col-12 col-md-9 col-lg-10">
            <div class="hammock-form-card">
                <h1 class="hammock-form-title">Edit markdown post</h1>
                <p class="hammock-form-sub">{{ project_name }} / {{ post_name }}</p>

                <form method="post" action="{{ url_for('.edit_post', project=project_name, post=post_name) }}"
                      class="hammock-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="hammock-field">
                        <label class="hammock-label">Title</label>
                        <input type="text" name="title" class="hammock-input"
                               value="{{ meta.title }}" required maxlength="120">
                    </div>

                    <div class="hammock-field">
                        <label class="hammock-label">Markdown</label>
                        <textarea name="source_md" class="hammock-input hammock-md-editor"
                                  rows="22" spellcheck="false">{{ source_md }}</textarea>
                    </div>

                    <div class="hammock-actions">
                        <a href="{{ url_for('.view_post', project=project_name, post=post_name) }}"
                           class="hammock-btn hammock-btn-ghost">Cancel</a>
                        <button type="submit" class="hammock-btn hammock-btn-primary">Update post</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
