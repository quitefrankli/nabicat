{% extends "simulations_base.html" %}

{% block page_content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-12 col-xl-10">

      <div class="text-center mb-3">
        <h1 class="sim-title">Conway's Game of Life</h1>
        <p class="text-muted mb-0 small">Tap cells to toggle. Two rules: a live cell with 2&ndash;3 live neighbours survives; a dead cell with exactly 3 is born.</p>
      </div>

      <div class="gol-panel">
        <div class="gol-toolbar">
          <div class="d-flex gap-2 align-items-center flex-wrap">
            <button class="btn-sim btn-sim-primary" id="gol-play" aria-label="Play or pause">
              <i class="bi bi-play-fill" id="gol-play-icon"></i>
              <span id="gol-play-label">Play</span>
            </button>
            <button class="btn-sim" id="gol-step" title="Advance one generation">
              <i class="bi bi-skip-forward-fill"></i>
              <span>Step</span>
            </button>
            <button class="btn-sim" id="gol-reset" title="Reset to glider">
              <i class="bi bi-arrow-counterclockwise"></i>
              <span>Reset</span>
            </button>
            <button class="btn-sim" id="gol-random" title="Randomize ~25% live">
              <i class="bi bi-shuffle"></i>
              <span>Random</span>
            </button>
            <button class="btn-sim btn-sim-ghost" id="gol-clear" title="Clear all cells">
              <i class="bi bi-eraser"></i>
              <span>Clear</span>
            </button>
          </div>
          <div class="gol-speed">
            <label for="gol-speed" class="gol-speed-label">
              <i class="bi bi-speedometer2"></i>
              <span id="gol-speed-value">10</span> gen/s
            </label>
            <input type="range" id="gol-speed" min="1" max="60" value="10" step="1">
          </div>
        </div>

        <div class="gol-canvas-wrap">
          <canvas id="gol-canvas"></canvas>
        </div>

        <div class="gol-status">
          <span><i class="bi bi-grid"></i> Grid: <span id="gol-dims">—</span></span>
          <span><i class="bi bi-circle-fill text-sage"></i> Alive: <span id="gol-alive">0</span></span>
          <span><i class="bi bi-clock-history"></i> Gen: <span id="gol-gen">0</span></span>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script src="{{ url_for('.static', filename='game_of_life.js') }}" defer></script>
{% endblock %}
