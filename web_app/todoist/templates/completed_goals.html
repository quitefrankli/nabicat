{% for dated_goal_block in dated_goal_blocks %}
<div class="card shadow-sm my-3 dated-goal-card">
    <div class="card-header dated-goal-header">
        <h5 class="text-white mb-0">
            <i class="bi bi-calendar-check me-2"></i>{{ dated_goal_block[0] }}
        </h5>
    </div>
    <div class="card-body p-3">
        {% for goal in dated_goal_block[1] %}
        <div class="accordion mb-2" id="accordion{{ goal.id }}">
            <div class="accordion-item goal-accordion-item">
                <h2 class="accordion-header" id="heading{{ goal.id }}">
                    <button 
                        class="accordion-button collapsed" 
                        type="button" 
                        data-bs-toggle="collapse" 
                        data-bs-target="#collapse{{ goal.id }}" 
                        aria-expanded="false" 
                        aria-controls="collapse{{ goal.id }}"
                        class="accordion-button collapsed goal-accordion-button">
                        <div class="d-flex align-items-center w-100">
                            <i class="bi bi-check-circle-fill text-sage me-2"></i>
                            <span class="fw-medium text-forest">{{ goal.name }}</span>
                        </div>
                    </button>
                </h2>
                <div id="collapse{{ goal.id }}" class="accordion-collapse collapse" aria-labelledby="heading{{ goal.id }}" data-bs-parent="#accordion{{ goal.id }}">
                    <div class="accordion-body goal-accordion-body">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title mb-3 goal-card-title">
                                    <i class="bi bi-flag-fill me-2"></i>{{ goal.name }}
                                </h5>
                                <div class="card-text goal-description">
                                    {{ goal.description or "No description provided." }}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endfor %}
